<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026학년도 대입 설명회 및 교사간담회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        /* 호버 툴팁 스타일 */
        .tooltip-container {
            position: relative;
        }
        
        .tooltip-text {
            visibility: hidden;
            width: 200px;
            background-color: #334155;
            color: #fff;
            text-align: left;
            border-radius: 12px;
            padding: 12px;
            position: absolute;
            z-index: 50;
            bottom: 110%; /* 날짜 칸 위로 표시 */
            left: 50%;
            margin-left: -100px;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(10px);
            font-size: 0.875rem;
            line-height: 1.4;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            pointer-events: none; /* 마우스가 툴팁을 방해하지 않게 */
        }

        .tooltip-container:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        /* 툴팁 화살표 */
        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #334155 transparent transparent transparent;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 p-4 md:p-8 font-sans text-slate-800 flex flex-col items-center">

    <div class="w-full max-w-5xl bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(8,_112,_184,_0.05)] p-6 md:p-10 border-4 border-white/60 relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-indigo-900 tracking-tight">
                2026학년도 대입 설명회 및 교사간담회
            </h1>
            <p class="text-indigo-400 mt-2 font-medium">고3 진학 지도를 위한 실시간 협업 스케쥴러</p>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-indigo-50/50 p-4 md:px-6 rounded-3xl gap-4">
            <div class="flex items-center gap-3 text-indigo-600 font-bold text-lg md:text-xl">
                <div class="bg-white p-2 rounded-2xl shadow-sm text-indigo-500">
                    <i data-lucide="book-open"></i>
                </div>
                <span>대입 설명회 및 교사간담회</span>
            </div>

            <div class="flex items-center gap-3">
                <select id="monthSelect" class="appearance-none bg-white text-indigo-700 font-bold text-lg border-2 border-indigo-100 rounded-2xl px-6 py-3 pr-10 focus:outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100 transition-all cursor-pointer shadow-sm" style="background-image: url(&quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%234338ca'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'%3E%3C/path%3E%3C/svg%3E&quot;); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.5em 1.5em;">
                    <option value="4">4월 (April)</option>
                    <option value="5">5월 (May)</option>
                    <option value="6">6월 (June)</option>
                    <option value="7">7월 (July)</option>
                    <option value="8">8월 (August)</option>
                    <option value="9">9월 (September)</option>
                </select>
            </div>
        </div>

        <div class="bg-slate-50/50 p-4 rounded-[2rem] border border-slate-100">
            <div id="calendarGrid" class="grid grid-cols-7 gap-2 md:gap-4"></div>
        </div>
    </div>

    <div id="memoModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden border-4 border-indigo-50">
            <div class="bg-indigo-50 px-6 py-4 flex justify-between items-center">
                <h3 class="text-xl font-bold text-indigo-900 flex items-center gap-2">
                    <i data-lucide="message-circle" class="text-indigo-500 w-5 h-5"></i>
                    <span id="modalTitle">일정</span>
                </h3>
                <button onclick="closeModal()" class="text-indigo-400 hover:text-indigo-600 bg-white rounded-full p-1 shadow-sm">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6">
                <textarea id="memoInput" placeholder="공유할 일정을 입력하세요." class="w-full h-40 bg-slate-50 border-2 border-indigo-100 rounded-2xl p-4 focus:outline-none focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100 resize-none"></textarea>
                <div class="flex gap-3 mt-6">
                    <button onclick="closeModal()" class="flex-1 bg-slate-100 font-bold py-3 rounded-xl">취소</button>
                    <button onclick="saveMemo()" class="flex-1 bg-indigo-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-200 active:scale-95 transition-all">저장하기</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 🌟 [중요] 3단계에서 복사한 선생님의 Firebase 설정값을 아래 빈칸에 붙여넣어 주세요! 🌟
        const firebaseConfig = {
          apiKey: "AIzaSyDKu7xDkGfQGKSP2FmBemZBxrpmTuaPMZk",
          authDomain: "school-calendar-a7fa5.firebaseapp.com",
          projectId: "school-calendar-a7fa5",
          storageBucket: "school-calendar-a7fa5.firebasestorage.app",
          messagingSenderId: "835453443940",
          appId: "1:835453443940:web:fea322472985704f422471"
        };

        let db;
        let appId = "school-cal-2026"; // 데이터베이스 고유 저장소 이름
        let memos = {};
        let currentMonth = 4;
        let selectedDay = null;

        // UI 요소
        const monthSelect = document.getElementById('monthSelect');
        const calendarGrid = document.getElementById('calendarGrid');
        const statusBadge = document.createElement('div');
        statusBadge.className = "absolute top-4 right-4 text-xs font-bold px-3 py-1 rounded-full z-10 shadow-sm";
        document.body.appendChild(statusBadge);

        async function init() {
            // 사용자가 firebaseConfig에 apiKey를 제대로 넣었는지 확인
            if (Object.keys(firebaseConfig).length > 0 && firebaseConfig.apiKey) {
                // 실시간 동기화(클라우드) 모드 활성화
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                
                statusBadge.innerText = "☁️ 실시간 협업 중";
                statusBadge.classList.add('bg-green-100', 'text-green-700');
                
                // 익명 로그인으로 누구나 접근 가능하게 설정
                await signInAnonymously(auth);

                // 실시간 리스너 연결
                const memosRef = collection(db, 'artifacts', appId, 'public', 'data', 'memos');
                onSnapshot(memosRef, (snapshot) => {
                    memos = {};
                    snapshot.forEach(docSnap => { memos[docSnap.id] = docSnap.data().text; });
                    renderCalendar();
                }, (error) => {
                    console.error("Firestore 데이터 동기화 에러:", error);
                });
            } else {
                // 파이어베이스 설정이 비어있으면 로컬 저장 모드로 동작
                statusBadge.innerText = "💾 로컬 저장 모드 (Firebase 설정 필요)";
                statusBadge.classList.add('bg-slate-200', 'text-slate-600');
                const saved = localStorage.getItem('hs_collab_memos');
                if (saved) memos = JSON.parse(saved);
                renderCalendar();
            }
        }

        function renderCalendar() {
            const year = 2026;
            const daysInMonth = new Date(year, currentMonth, 0).getDate();
            const firstDay = new Date(year, currentMonth - 1, 1).getDay();
            const weekDays = ['일', '월', '화', '수', '목', '금', '토'];

            let html = '';
            weekDays.forEach((day, i) => {
                const color = i === 0 ? 'text-rose-500 bg-rose-50' : i === 6 ? 'text-blue-500 bg-blue-50' : 'text-slate-600 bg-white';
                html += `<div class="text-center font-bold py-3 rounded-2xl text-sm ${color} shadow-sm">${day}</div>`;
            });

            for (let i = 0; i < firstDay; i++) html += `<div></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${currentMonth}-${day}`;
                const text = memos[dateKey] || '';
                const isSun = (firstDay + day - 1) % 7 === 0;
                const isSat = (firstDay + day - 1) % 7 === 6;
                const color = isSun ? 'text-rose-500' : isSat ? 'text-blue-500' : 'text-slate-700';

                html += `
                    <div onclick="window.openModal(${day})" class="tooltip-container group min-h-[100px] bg-white rounded-2xl p-3 shadow-sm border-2 border-transparent hover:border-indigo-300 transition-all cursor-pointer flex flex-col">
                        <div class="flex justify-between items-start mb-1">
                            <span class="font-bold text-lg w-8 h-8 flex items-center justify-center rounded-full group-hover:bg-indigo-50 ${color}">${day}</span>
                            <i data-lucide="edit-2" class="w-4 h-4 text-indigo-200 opacity-0 group-hover:opacity-100"></i>
                        </div>
                        ${text ? `<div class="mt-1 bg-amber-50 text-amber-800 text-xs p-2 rounded-xl border border-amber-100 line-clamp-3">${text}</div>` : ''}
                        ${text ? `<span class="tooltip-text">${text.replace(/\n/g, '<br>')}</span>` : ''}
                    </div>
                `;
            }
            calendarGrid.innerHTML = html;
            lucide.createIcons();
        }

        window.openModal = (day) => {
            selectedDay = day;
            document.getElementById('modalTitle').innerText = `${currentMonth}월 ${day}일 일정`;
            document.getElementById('memoInput').value = memos[`2026-${currentMonth}-${day}`] || '';
            document.getElementById('memoModal').classList.remove('hidden');
            document.getElementById('memoModal').classList.add('flex');
        };

        window.closeModal = () => {
            document.getElementById('memoModal').classList.add('hidden');
            document.getElementById('memoModal').classList.remove('flex');
        };

        window.saveMemo = async () => {
            const dateKey = `2026-${currentMonth}-${selectedDay}`;
            const text = document.getElementById('memoInput').value.trim();
            
            if (db) {
                // 클라우드 모드: Firebase에 저장
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'memos', dateKey);
                if (text) await setDoc(docRef, { text });
                else await deleteDoc(docRef);
            } else {
                // 로컬 모드: 브라우저에 저장
                if (text) memos[dateKey] = text; else delete memos[dateKey];
                localStorage.setItem('hs_collab_memos', JSON.stringify(memos));
                renderCalendar();
            }
            window.closeModal();
        };

        monthSelect.addEventListener('change', (e) => { currentMonth = parseInt(e.target.value); renderCalendar(); });
        init();
        lucide.createIcons();
    </script>
</body>
</html>
